name: "Open Dynamic Export"
version: "3.0-beta"
slug: "open-dynamic-export"
description: "Dynamic solar export management with CSIP-AUS support"
url: "https://github.com/longzheng/open-dynamic-export"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
hassio_api: true
hassio_role: default

ingress: true
ingress_port: 3000

map:
  - config:rw
  - ssl:rw
options:
  sep2_cert_path: "ode/sep2-cert.pem"
  sep2_key_path: "ode/sep2-key.pem"
  sep2_pen: "12345"
  tz: "Australia/Sydney"
  config_file: |
    {
      "setpoints": {},
      "inverters": [
        {
          "type": "mqtt",
          "host": "mqtt://core-mosquitto",
          "username": "your_username",
          "password": "your_password",
          "topic": "inverters/1"
        }
      ],
      "inverterControl": {
        "enabled": false
      },
      "meter": {
        "type": "mqtt",
        "host": "mqtt://core-mosquitto",
        "username": "your_username",
        "password": "your_password",
        "topic": "site"
      },
      "publish": {
        "mqtt": {
          "host": "mqtt://core-mosquitto",
          "username": "your_username",
          "password": "your_password",
          "topic": "ode/limits"
        }
      }
    }
  log_level: info
schema:
  sep2_cert_path: str?
  sep2_key_path: str?
  sep2_pen: str?
  tz: str?
  config_file: str
  log_level: list(trace|debug|info|warning|error)?
