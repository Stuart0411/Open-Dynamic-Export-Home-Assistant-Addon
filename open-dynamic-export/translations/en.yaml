configuration:
  sep2_cert_path:
    name: SEP2 Certificate Path
    description: >-
      Path to your SEP2 client certificate PEM file, relative to /homeassistant.
      Default: ode/sep2-cert.pem (i.e. /homeassistant/ode/sep2-cert.pem).

  sep2_key_path:
    name: SEP2 Private Key Path
    description: >-
      Path to your SEP2 private key PEM file, relative to /homeassistant.
      Default: ode/sep2-key.pem (i.e. /homeassistant/ode/sep2-key.pem).

  sep2_pen:
    name: SEP2 Private Enterprise Number (PEN)
    description: >-
      Your inverter vendor's IANA Private Enterprise Number.
      Check with your DNSP or inverter manufacturer if unsure.

  config_file:
    name: ODE Configuration (JSON)
    description: >-
      Full contents of your ODE config.json. Configures inverters, meter,
      setpoints, publish targets and more. See https://opendynamicexport.com/guide/

  log_level:
    name: Log Level
    description: >-
      Verbosity of add-on logs. Use 'info' for normal operation, 'debug' or
      'trace' for troubleshooting, 'warning' or 'error' for quieter output.

  influxdb_enabled:
    name: Enable InfluxDB Logging
    description: >-
      When enabled, ODE will write metrics (power, export limits, setpoints)
      to your InfluxDB instance. Fill in the fields below to match your setup.
      The HA InfluxDB add-on (v1) uses host + port + username + password only —
      leave token, org, and bucket blank. InfluxDB v2 users fill in all fields.

  influxdb_host:
    name: InfluxDB Host
    description: >-
      Hostname or IP address of your InfluxDB instance.
      For the HA InfluxDB add-on (v1), find the IP in Settings → System → Network,
      or use the add-on's internal hostname shown in its Info tab (e.g. "influxdb").
      Only required when Enable InfluxDB Logging is on.

  influxdb_port:
    name: InfluxDB Port
    description: >-
      Port your InfluxDB instance listens on. Default is 8086 for both v1 and v2.
      Only required when Enable InfluxDB Logging is on.

  influxdb_username:
    name: InfluxDB Username
    description: >-
      InfluxDB username. For the HA InfluxDB v1 add-on, this is set in its
      Configuration tab under "auth: username".
      Leave blank if using token auth (InfluxDB v2).

  influxdb_password:
    name: InfluxDB Password
    description: >-
      InfluxDB password. For the HA InfluxDB v1 add-on, this is set in its
      Configuration tab under "auth: password".
      Leave blank if using token auth (InfluxDB v2).

  influxdb_admin_token:
    name: InfluxDB Admin Token (v2 only)
    description: >-
      InfluxDB v2 API token with write access to the target bucket.
      Generate one in InfluxDB v2 under Data → API Tokens.
      Leave blank if using the HA InfluxDB v1 add-on (use username/password instead).

  influxdb_org:
    name: InfluxDB Organisation (v2 only)
    description: >-
      Your InfluxDB v2 organisation name. Not used by InfluxDB v1.
      Leave blank if using the HA InfluxDB v1 add-on.

  influxdb_bucket:
    name: InfluxDB Bucket (v2 only)
    description: >-
      Your InfluxDB v2 bucket name. Not used by InfluxDB v1 (which uses databases).
      Leave blank if using the HA InfluxDB v1 add-on.
